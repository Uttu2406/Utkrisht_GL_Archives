<span class="stars">

  <span *ngFor="let star of stars"

        class="star"

        [class.filled]="star <= (hovered || rating)"
        [class.interactive]="interactive"

        (mouseenter)="hovered = interactive ? star : 0"
        (mouseleave)="hovered = 0"

        (click)="select(star)">
    ★
  </span>
</span>
