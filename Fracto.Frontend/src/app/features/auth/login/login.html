<div class="auth-wrap">
  <div class="card auth-card">

    <div class="auth-header">
      <i class="fas fa-hospital-user auth-icon"></i>
      <h2>Welcome Back</h2>
      <p>Login to book your appointments</p>
    </div>


    <div class="alert alert-danger" *ngIf="error">
      <i class="fas fa-circle-exclamation"></i> {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group">
        <label>
          <i class="fas fa-envelope"></i> Email
        </label>


        <input class="form-control"
               [class.is-invalid]="email.invalid && email.touched"
               type="email"
               formControlName="emailAddress"
               placeholder="you@email.com" />
        <div class="error-msg" *ngIf="email.invalid && email.touched"> Please enter a valid email.</div>

      </div>

      <div class="form-group">
        <label>
          <i class="fas fa-lock"></i> Password
        </label>
        <input class="form-control"
               [class.is-invalid]="password.invalid && password.touched"
               type="password"
               formControlName="password"
               placeholder="Your password" />
        <div class="error-msg" *ngIf="password.invalid && password.touched">
          Password is required.
        </div>
      </div>

      <button class="btn btn-primary btn-block"
              type="submit"
              [disabled]="loading">
        <i class="fas fa-right-to-bracket"></i>
        {{ loading ? 'Logging in...' : 'Login' }}
      </button>

    </form>

    <p class="auth-link">
      Don't have an account? (T~T)
      <a routerLink="/register">Register here</a>
    </p>

  </div>
</div>
