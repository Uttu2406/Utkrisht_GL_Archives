<div class="admin-layout">

  <aside class="sidebar">
    <h2 class="sidebar-title">Admin Panel</h2>
    <nav>
      <a routerLink="/admin/users" routerLinkActive="active">
        <i class="fas fa-users"></i> Users
      </a>
      <a routerLink="/admin/doctors" routerLinkActive="active">
        <i class="fas fa-user-doctor"></i> Doctors
      </a>
      <a routerLink="/admin/specializations" routerLinkActive="active">
        <i class="fas fa-briefcase-medical"></i> Specializations
      </a>
      <a routerLink="/admin/appointments" routerLinkActive="active">
        <i class="fas fa-calendar"></i> Appointments
      </a>
    </nav>
  </aside>

  <div class="admin-main">

    <div class="page-header">
      <h1 class="page-title">
        <i class="fas fa-briefcase-medical"></i> Manage Specializations
      </h1>
      <button class="btn btn-primary btn-sm" (click)="openAdd()">
        <i class="fas fa-plus"></i> Add
      </button>
    </div>

    <div class="alert alert-success" *ngIf="success">{{ success }}</div>
    <div class="alert alert-danger" *ngIf="error">{{ error }}</div>

    <div class="card" *ngIf="showForm">
      <form [formGroup]="form" (ngSubmit)="save()">
        <div class="form-group">
          <label>Specialization Name</label>
          <input class="form-control"
                 formControlName="specializationName"
                 placeholder="e.g. Cardiology" />
          <div class="error-msg"
               *ngIf="form.get('specializationName')?.invalid && form.get('specializationName')?.touched">
            Required
          </div>
        </div>
        <div style="display: flex; gap: 0.5rem;">
          <button class="btn btn-success btn-sm" type="submit">Save</button>
          <button class="btn btn-secondary btn-sm" type="button" (click)="showForm = false">Cancel</button>
        </div>
      </form>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let s of specs">
            <td>{{ s.specializationId }}</td>
            <td>{{ s.specializationName }}</td>
            <td>
              <button class="btn btn-secondary btn-sm" (click)="openEdit(s)">
                <i class="fas fa-pen"></i> Edit
              </button>
              <button class="btn btn-danger btn-sm" style="margin-left: 6px;" (click)="delete(s.specializationId)">
                <i class="fas fa-trash"></i> Delete
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

  </div>
</div>
